<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCTUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #34a8da; --sec: #f4f4f5; --brd: #e1e1e1; }
        body.tg-dark { --bg: #1a1a1a; --text: #ffffff; --sec: #2b2b2b; --brd: #3d3d3d; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; }
        .tabs { display: flex; border-bottom: 1px solid var(--brd); }
        .tab { flex: 1; padding: 15px; text-align: center; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }
        .container { padding: 20px; display: none; }
        .container.active { display: flex; flex-direction: column; }
        .timer-display { font-size: 80px; font-weight: 200; text-align: center; margin: 40px 0; font-variant-numeric: tabular-nums; }
        .label { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--brd); background: var(--sec); color: var(--text); font-size: 16px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--accent); color: white; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body class="tg-light">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('focus')">Фокус</div>
        <div class="tab" onclick="switchTab('tasks')">Задачи</div>
    </div>

    <div id="focus" class="container active">
        <div class="timer-display" id="timer">25:00</div>
        <div class="label">Метод</div>
        <select id="method" onchange="updateTimer()">
            <option value="pomodoro" data-time="25">Pomodoro (25 мин)</option>
            <option value="flow" data-time="50">Flow (50 мин)</option>
            <option value="deep" data-time="90">Deep Work (90 мин)</option>
        </select>
        <button class="btn" id="tBtn" onclick="startTimer()">ЗАПУСТИТЬ</button>
    </div>

    <div id="tasks" class="container">
        <div class="label">Задача</div>
        <input type="text" id="tTitle" placeholder="Что сделать?">
        <div class="label">Приоритет</div>
        <select id="tPrio">
            <option value="🟢">🟢 Обычный</option>
            <option value="🟡">🟡 Важный</option>
            <option value="🔴">🔴 Критичный</option>
        </select>
        <div class="label">Дедлайн</div>
        <input type="datetime-local" id="tDead">
        <button class="btn" onclick="addTask()">СОХРАНИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.colorScheme === 'dark') document.body.classList.add('tg-dark');

        let endTime = null;
        const params = new URLSearchParams(window.location.search);
        const sTime = params.get('end_time');

        if (sTime) {
            endTime = new Date(sTime);
            runTimer();
        }

        function switchTab(id) {
            document.querySelectorAll('.container, .tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateTimer() {
            if (endTime) return;
            const mins = document.getElementById('method').selectedOptions[0].getAttribute('data-time');
            document.getElementById('timer').innerText = mins + ":00";
        }

        function startTimer() {
            const sel = document.getElementById('method');
            const mins = parseInt(sel.selectedOptions[0].getAttribute('data-time'));
            tg.sendData(JSON.stringify({ action: "start_timer", method: sel.value, duration: mins }));
            tg.close();
        }

        function runTimer() {
            document.getElementById('tBtn').disabled = true;
            document.getElementById('tBtn').innerText = "ФОКУС ИДЕТ";
            setInterval(() => {
                const diff = endTime - new Date();
                if (diff <= 0) {
                    document.getElementById('timer').innerText = "00:00";
                    return;
                }
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${m}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function addTask() {
            const title = document.getElementById('tTitle').value;
            if (!title) return tg.showAlert("Укажи название");
            tg.sendData(JSON.stringify({
                action: "add_task_full",
                title: title,
                priority: document.getElementById('tPrio').value,
                deadline: document.getElementById('tDead').value
            }));
            tg.close();
        }
    </script>
</body>
</html>
