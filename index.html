<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCTUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f0f0f);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #707070);
            --accent: var(--tg-theme-button-color, #50a8eb);
            --card: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .container { padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .timer-display { font-size: 82px; font-weight: 200; letter-spacing: -4px; margin: 20px 0; }
        
        /* Tabs */
        .tabs { display: flex; justify-content: space-around; border-bottom: 1px solid var(--card); margin-bottom: 20px; }
        .tab { padding: 10px 20px; color: var(--hint); cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Forms */
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        input, textarea, select {
            width: 100%; background: rgba(255,255,255,0.08); border: none; 
            border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 12px; box-sizing: border-box;
        }
        h4 { margin: 0 0 8px 0; font-size: 14px; color: var(--accent); }
        p { font-size: 12px; color: var(--hint); margin: 0 0 12px 0; }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
        }
        .btn-stop { background: #eb4034; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('focus')">Фокус</div>
        <div class="tab" onclick="showTab('tasks')">Задачи</div>
    </div>

    <div id="focus" class="container">
        <div class="header">
            <div class="timer-display" id="timer">25:00</div>
            <p id="method-desc">Выберите методику для начала работы</p>
        </div>
        
        <div id="setup-timer">
            <h4>Методика</h4>
            <select id="method-select" onchange="updateMethodDesc()">
                <option value="pomodoro">Pomodoro (25/5)</option>
                <option value="flow">Flow (50/10)</option>
                <option value="deep">Deep Work (90/20)</option>
            </select>
            <button class="btn" onclick="startTimer()">ЗАПУСТИТЬ ТАЙМЕР</button>
        </div>

        <div id="active-timer" class="hidden">
            <button class="btn btn-stop" onclick="stopTimer()">ОСТАНОВИТЬ</button>
        </div>
    </div>

    <div id="tasks" class="container hidden">
        <div class="card">
            <h4>Новая задача</h4>
            <input type="text" id="taskTitle" placeholder="Заголовок">
            <textarea id="taskDesc" placeholder="Описание (необязательно)"></textarea>
            <input type="datetime-local" id="taskDeadline">
            <div style="display:flex; gap:10px; margin-bottom:12px;">
                <select id="taskPriority">
                    <option value="🔴">Срочно (🔴)</option>
                    <option value="🟡">Важно (🟡)</option>
                    <option value="🟢" selected>Обычное (🟢)</option>
                </select>
            </div>
            <button class="btn" onclick="addTask()">ДОБАВИТЬ В СПИСОК</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showTab(tabId) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        const methods = {
            pomodoro: "Классика: 25 минут работы и 5 минут отдыха. Идеально для рутины.",
            flow: "Золотой стандарт: 50 минут погружения для сложных задач.",
            deep: "Глубокая работа: 90 минут для творческих и инженерных прорывов."
        };

        function updateMethodDesc() {
            let m = document.getElementById('method-select').value;
            document.getElementById('method-desc').innerText = methods[m];
        }

        function startTimer() {
            let m = document.getElementById('method-select').value;
            tg.sendData(JSON.stringify({action: "start_timer", method: m}));
            tg.close();
        }

        function stopTimer() {
            tg.sendData(JSON.stringify({action: "stop_timer"}));
            tg.close();
        }

        function addTask() {
            let data = {
                action: "add_task_full",
                title: document.getElementById('taskTitle').value,
                desc: document.getElementById('taskDesc').value,
                deadline: document.getElementById('taskDeadline').value,
                priority: document.getElementById('taskPriority').value
            };
            if(!data.title) return tg.showAlert("Заголовок обязателен");
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
