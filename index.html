<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUNCTUM Focus</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #000000; --accent: #34a8dab; }
        body.tg-dark { --bg: #1a1a1a; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .timer-display { font-size: 80px; font-weight: 300; margin: 40px 0; font-variant-numeric: tabular-nums; }
        .method-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #34a8da; color: white; font-size: 18px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body class="tg-light">
    <div class="timer-display" id="timer">25:00</div>
    
    <select id="method" class="method-select" onchange="updateDisplay()">
        <option value="pomodoro" data-time="25">Pomodoro (25 мин)</option>
        <option value="flow" data-time="50">Flow (50 мин)</option>
        <option value="deep" data-time="90">Deep Work (90 мин)</option>
    </select>

    <button class="btn" id="mainBtn" onclick="toggleTimer()">ЗАПУСТИТЬ ТАЙМЕР</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.colorScheme === 'dark') document.body.classList.add('tg-dark');

        let timerInterval;
        let endTime = null;

        // 1. Проверяем, передал ли бот время окончания через URL
        const urlParams = new URLSearchParams(window.location.search);
        const serverEndTime = urlParams.get('end_time');

        if (serverEndTime) {
            endTime = new Date(serverEndTime);
            startCountdown();
        }

        function updateDisplay() {
            if (timerInterval) return;
            const select = document.getElementById('method');
            const mins = select.options[select.selectedIndex].getAttribute('data-time');
            document.getElementById('timer').innerText = `${mins}:00`;
        }

        function toggleTimer() {
            const select = document.getElementById('method');
            const method = select.value;
            const mins = parseInt(select.options[select.selectedIndex].getAttribute('data-time'));
            
            // Отправляем боту команду на запуск
            tg.sendData(JSON.stringify({
                action: "start_timer",
                method: method,
                duration: mins
            }));
            tg.close();
        }

        function startCountdown() {
            document.getElementById('mainBtn').innerText = "ТАЙМЕР ЗАПУЩЕН";
            document.getElementById('mainBtn').disabled = true;
            document.getElementById('method').disabled = true;

            timerInterval = setInterval(() => {
                const now = new Date();
                const diff = endTime - now;

                if (diff <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerText = "00:00";
                    return;
                }

                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = 
                    `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
